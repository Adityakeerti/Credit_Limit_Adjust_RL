spring:
  application:
    name: autolend

  # Primary Datasource - Bank DB
  # Override via env: SPRING_DATASOURCE_URL / USERNAME / PASSWORD
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/arthacore_bank}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:aditya}
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # Valkey Configuration (open-source Redis fork — 100% Redis protocol compatible)
  # Override via env: SPRING_DATA_REDIS_HOST / PORT / PASSWORD / SSL_ENABLED
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}
      timeout: 2000ms

  # Cache Configuration (backed by Valkey)
  cache:
    type: redis
    redis:
      time-to-live: 300000

# Secondary Datasource - Risk DB (configured programmatically)
risk:
  datasource:
    url: ${RISK_DATASOURCE_URL:jdbc:postgresql://localhost:5432/arthacore_risk}
    username: ${RISK_DATASOURCE_USERNAME:postgres}
    password: ${RISK_DATASOURCE_PASSWORD:aditya}
    driver-class-name: org.postgresql.Driver

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:YXJ0aGFjb3JlLWF1dG9sZW5kLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTIwMjY=}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in ms

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# Actuator — health endpoint for Docker health checks, Koyeb, UptimeRobot
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.lendingbackend: DEBUG
    org.springframework.security: DEBUG
