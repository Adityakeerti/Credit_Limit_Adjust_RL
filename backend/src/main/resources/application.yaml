spring:
  application:
    name: autolend

  # Primary Datasource - Bank DB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/arthacore_bank}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:aditya}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      connection-test-query: SELECT 1

  # JPA Configuration — dialect set explicitly so Hibernate never needs to auto-detect
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false

  # Valkey / Redis (Upstash) — open-source Redis fork, 100% protocol compatible
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 4
          max-idle: 2
          min-idle: 0
          max-wait: 2000ms

  # Cache Configuration (backed by Valkey/Redis)
  cache:
    type: redis
    redis:
      time-to-live: 300000

# Secondary Datasource - Risk DB (configured programmatically via risk.datasource.*)
risk:
  datasource:
    url: ${RISK_DATASOURCE_URL:jdbc:postgresql://localhost:5432/arthacore_risk}
    username: ${RISK_DATASOURCE_USERNAME:postgres}
    password: ${RISK_DATASOURCE_PASSWORD:aditya}
    driver-class-name: org.postgresql.Driver

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:YXJ0aGFjb3JlLWF1dG9sZW5kLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTIwMjY=}
  expiration: ${JWT_EXPIRATION:86400000}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# Actuator — /actuator/health for Docker/Render health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.lendingbackend: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
